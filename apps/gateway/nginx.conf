worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" id=$http_x_request_id';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Add X-Request-ID to every request
    map $http_x_request_id $request_id_value {
        default $http_x_request_id;
        ""      $request_id;
    }

    upstream auth_service {
        server auth-service:3001;
    }

    upstream places_service {
        server places-service:3002;
    }

    upstream admin_service {
        server admin-service:3003;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check endpoint
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id_value;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        location /api/auth {
            proxy_pass http://auth_service;
        }

        location /api/places {
            proxy_pass http://places_service;
        }

        location /api/admin {
            proxy_pass http://admin_service;
        }

        # Catch-all: 404
        location / {
            return 404 '{"error":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
